name: Omer Reminder

# All times are UTC. EDT = UTC-4, so 8:22 PM EDT = 00:22 UTC next calendar day.
# Regular sends fire 10 minutes after nightfall (Eastern), sent to all subscribers.
# Friday sends fire 90 minutes before Shabbat with a special message.

on:
  workflow_dispatch:         # triggered by cron-job.org at the correct time each night

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Omer reminders
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          python3 << 'EOF'
          import smtplib, os, csv, io, urllib.request
          from email.mime.text import MIMEText
          from datetime import date, datetime, timezone

          # UTC date -> Omer day number (for regular nightly sends)
          # Key is the UTC date when the cron fires (8 PM EDT = midnight UTC next day)
          SCHEDULE = {
              date(2026, 4, 13): 11,
              date(2026, 4, 14): 12,
              date(2026, 4, 15): 13,
              date(2026, 4, 16): 14,
              date(2026, 4, 17): 15,
              date(2026, 4, 19): 17,
              date(2026, 4, 20): 18,
              date(2026, 4, 21): 19,
              date(2026, 4, 22): 20,
              date(2026, 4, 23): 21,
              date(2026, 4, 24): 22,
              date(2026, 4, 26): 24,
              date(2026, 4, 27): 25,
              date(2026, 4, 28): 26,
              date(2026, 4, 29): 27,
              date(2026, 4, 30): 28,
              date(2026, 5,  1): 29,
              date(2026, 5,  3): 31,
              date(2026, 5,  4): 32,
              date(2026, 5,  5): 33,
              date(2026, 5,  6): 34,
              date(2026, 5,  7): 35,
              date(2026, 5,  8): 36,
              date(2026, 5, 10): 38,
              date(2026, 5, 11): 39,
              date(2026, 5, 12): 40,
              date(2026, 5, 13): 41,
              date(2026, 5, 14): 42,
              date(2026, 5, 15): 43,
              date(2026, 5, 17): 45,
              date(2026, 5, 18): 46,
              date(2026, 5, 19): 47,
              date(2026, 5, 20): 48,
              date(2026, 5, 21): 49,
          }

          # Transliterated counting text for each Omer day
          HEBREW = {
              11: "Hayom echad asar yom shehem shavuah echad v'arba'ah yamim la'omer",
              12: "Hayom shneim asar yom shehem shavuah echad vachamishah yamim la'omer",
              13: "Hayom shloshah asar yom shehem shavuah echad veshishah yamim la'omer",
              14: "Hayom arba'ah asar yom shehem shnei shavuot la'omer",
              15: "Hayom chamishah asar yom shehem shnei shavuot veyom echad la'omer",
              16: "Hayom shishah asar yom shehem shnei shavuot ushnei yamim la'omer",
              17: "Hayom shiv'ah asar yom shehem shnei shavuot ushloshah yamim la'omer",
              18: "Hayom shmonah asar yom shehem shnei shavuot v'arba'ah yamim la'omer",
              19: "Hayom tish'ah asar yom shehem shnei shavuot vachamishah yamim la'omer",
              20: "Hayom esrim yom shehem shnei shavuot veshishah yamim la'omer",
              21: "Hayom esrim v'echad yom shehem shloshah shavuot la'omer",
              22: "Hayom esrim ushnaim yom shehem shloshah shavuot veyom echad la'omer",
              23: "Hayom esrim ushloshah yom shehem shloshah shavuot ushnei yamim la'omer",
              24: "Hayom esrim v'arba'ah yom shehem shloshah shavuot ushloshah yamim la'omer",
              25: "Hayom esrim vachamishah yom shehem shloshah shavuot v'arba'ah yamim la'omer",
              26: "Hayom esrim veshishah yom shehem shloshah shavuot vachamishah yamim la'omer",
              27: "Hayom esrim veshiv'ah yom shehem shloshah shavuot veshishah yamim la'omer",
              28: "Hayom esrim ushmonah yom shehem arba'ah shavuot la'omer",
              29: "Hayom esrim v'tish'ah yom shehem arba'ah shavuot veyom echad la'omer",
              30: "Hayom shloshim yom shehem arba'ah shavuot ushnei yamim la'omer",
              31: "Hayom shloshim v'echad yom shehem arba'ah shavuot ushloshah yamim la'omer",
              32: "Hayom shloshim ushnaim yom shehem arba'ah shavuot v'arba'ah yamim la'omer",
              33: "Hayom shloshim ushloshah yom shehem arba'ah shavuot vachamishah yamim la'omer",
              34: "Hayom shloshim v'arba'ah yom shehem arba'ah shavuot veshishah yamim la'omer",
              35: "Hayom shloshim vachamishah yom shehem chamishah shavuot la'omer",
              36: "Hayom shloshim veshishah yom shehem chamishah shavuot veyom echad la'omer",
              37: "Hayom shloshim veshiv'ah yom shehem chamishah shavuot ushnei yamim la'omer",
              38: "Hayom shloshim ushmonah yom shehem chamishah shavuot ushloshah yamim la'omer",
              39: "Hayom shloshim v'tish'ah yom shehem chamishah shavuot v'arba'ah yamim la'omer",
              40: "Hayom arba'im yom shehem chamishah shavuot vachamishah yamim la'omer",
              41: "Hayom arba'im v'echad yom shehem chamishah shavuot veshishah yamim la'omer",
              42: "Hayom arba'im ushnaim yom shehem shishah shavuot la'omer",
              43: "Hayom arba'im ushloshah yom shehem shishah shavuot veyom echad la'omer",
              44: "Hayom arba'im v'arba'ah yom shehem shishah shavuot ushnei yamim la'omer",
              45: "Hayom arba'im vachamishah yom shehem shishah shavuot ushloshah yamim la'omer",
              46: "Hayom arba'im veshishah yom shehem shishah shavuot v'arba'ah yamim la'omer",
              47: "Hayom arba'im veshiv'ah yom shehem shishah shavuot vachamishah yamim la'omer",
              48: "Hayom arba'im ushmonah yom shehem shishah shavuot veshishah yamim la'omer",
              49: "Hayom arba'im v'tish'ah yom shehem shiv'ah shavuot la'omer",
          }

          # Friday sends: UTC date -> (Omer day, nightfall time string)
          # UTC date = same EDT date since these fire at ~10 PM UTC
          FRIDAY_SCHEDULE = {
              date(2026, 4, 17): (16, "8:17 PM"),
              date(2026, 4, 24): (23, "8:24 PM"),
              date(2026, 5,  1): (30, "8:31 PM"),
              date(2026, 5,  8): (37, "8:38 PM"),
              date(2026, 5, 15): (44, "8:45 PM"),
          }

          now   = datetime.now(timezone.utc)
          today = now.date()
          hour  = now.hour

          is_friday_send  = today in FRIDAY_SCHEDULE and hour in (21, 22)
          is_regular_send = today in SCHEDULE and hour in (0, 1)

          if not is_friday_send and not is_regular_send:
              print(f"No send scheduled for UTC {today} hour {hour}. Skipping.")
              exit(0)

          # Fetch subscriber list
          sheet_url = os.environ['SHEET_CSV_URL']
          with urllib.request.urlopen(sheet_url) as resp:
              csv_data = resp.read().decode('utf-8')
          all_subscribers = list(csv.DictReader(io.StringIO(csv_data)))

          # Build (subscriber, message) pairs
          sends = []
          if is_friday_send:
              day, nightfall = FRIDAY_SCHEDULE[today]
              print(f"Friday send — Day {day}, nightfall {nightfall}, {len(all_subscribers)} subscriber(s).")
              for sub in all_subscribers:
                  name     = sub.get('Name', '').strip()
                  greeting = f"Hey {name}! " if name else ""
                  hebrew   = HEBREW.get(day, '')
                  body     = (f"{greeting}Don't forget to count Day {day} of the Omer "
                              f"tonight after {nightfall}. Shabbat shalom! {hebrew}")
                  sends.append((sub, body))
          else:
              day  = SCHEDULE[today]
              print(f"Regular send — Day {day}, {len(all_subscribers)} subscriber(s).")
              for sub in all_subscribers:
                  name     = sub.get('Name', '').strip()
                  greeting = f"Hey {name}! " if name else ""
                  hebrew   = HEBREW.get(day, '')
                  body     = f"{greeting}Don't forget to count the Omer! Day {day} {hebrew}"
                  sends.append((sub, body))

          # Send all messages
          gmail_user     = os.environ['GMAIL_USER']
          gmail_password = os.environ['GMAIL_PASSWORD']
          sent = errors  = 0

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(gmail_user, gmail_password)
              for sub, body in sends:
                  phone = ''.join(c for c in sub.get('Phone', '') if c.isdigit())
                  if len(phone) == 11 and phone[0] == '1':
                      phone = phone[1:]
                  gateway = sub.get('Carrier', '').strip()
                  if not phone or not gateway:
                      print(f"Skipping incomplete row: {sub}")
                      continue
                  to_sms = f"{phone}@{gateway}"
                  msg            = MIMEText(body)
                  msg['Subject'] = ''
                  msg['From']    = gmail_user
                  msg['To']      = to_sms
                  try:
                      smtp.send_message(msg)
                      print(f"Sent to {to_sms}: {body}")
                      sent += 1
                  except Exception as e:
                      print(f"Error sending to {to_sms}: {e}")
                      errors += 1

          print(f"Done. Sent: {sent}, Errors: {errors}")
          EOF
