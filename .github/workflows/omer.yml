name: Omer Reminder

# Runs at UTC 00:00, 01:00, 02:00, 03:00 daily — covering 8 PM across US timezones:
#   00:00 UTC = 8:00 PM EDT (Eastern)
#   01:00 UTC = 8:00 PM CDT (Central)
#   02:00 UTC = 8:00 PM MDT (Mountain)
#   03:00 UTC = 8:00 PM PDT (Pacific)
on:
  schedule:
    - cron: '0 0,1,2,3 * * *'
  workflow_dispatch:  # allows manual test runs from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Omer reminders
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          python3 << 'EOF'
          import smtplib, os, csv, io, urllib.request
          from email.mime.text import MIMEText
          from datetime import date, datetime, timezone

          # UTC hour -> which timezone to send to at ~8 PM local time
          TIMEZONE_FOR_HOUR = {
              0: 'Eastern',
              1: 'Central',
              2: 'Mountain',
              3: 'Pacific',
          }

          # UTC date -> Omer day number
          # Key is the UTC date when the cron fires (UTC is ahead of US local time at 8 PM)
          SCHEDULE = {
              date(2026, 4, 13): 11,
              date(2026, 4, 14): 12,
              date(2026, 4, 15): 13,
              date(2026, 4, 16): 14,
              date(2026, 4, 17): 15,
              date(2026, 4, 18): 16,
              date(2026, 4, 19): 17,
              date(2026, 4, 20): 18,
              date(2026, 4, 21): 19,
              date(2026, 4, 22): 20,
              date(2026, 4, 23): 21,
              date(2026, 4, 24): 22,
              date(2026, 4, 25): 23,
              date(2026, 4, 26): 24,
              date(2026, 4, 27): 25,
              date(2026, 4, 28): 26,
              date(2026, 4, 29): 27,
              date(2026, 4, 30): 28,
              date(2026, 5,  1): 29,
              date(2026, 5,  2): 30,
              date(2026, 5,  3): 31,
              date(2026, 5,  4): 32,
              date(2026, 5,  5): 33,
              date(2026, 5,  6): 34,
              date(2026, 5,  7): 35,
              date(2026, 5,  8): 36,
              date(2026, 5,  9): 37,
              date(2026, 5, 10): 38,
              date(2026, 5, 11): 39,
              date(2026, 5, 12): 40,
              date(2026, 5, 13): 41,
              date(2026, 5, 14): 42,
              date(2026, 5, 15): 43,
              date(2026, 5, 16): 44,
              date(2026, 5, 17): 45,
              date(2026, 5, 18): 46,
              date(2026, 5, 19): 47,
              date(2026, 5, 20): 48,
              date(2026, 5, 21): 49,
          }

          now = datetime.now(timezone.utc)
          today = now.date()
          hour = now.hour

          if today not in SCHEDULE:
              print(f"No Omer reminder scheduled for UTC {today}. Skipping.")
              exit(0)

          if hour not in TIMEZONE_FOR_HOUR:
              print(f"UTC hour {hour} is not a send time. Skipping.")
              exit(0)

          day = SCHEDULE[today]
          target_tz = TIMEZONE_FOR_HOUR[hour]
          print(f"Omer day {day} — sending to {target_tz} subscribers.")

          # Fetch subscriber list from published Google Sheet CSV
          sheet_url = os.environ['SHEET_CSV_URL']
          with urllib.request.urlopen(sheet_url) as resp:
              csv_data = resp.read().decode('utf-8')

          reader = csv.DictReader(io.StringIO(csv_data))
          subscribers = [row for row in reader if row.get('Timezone', '').strip() == target_tz]

          if not subscribers:
              print(f"No {target_tz} subscribers found. Skipping.")
              exit(0)

          print(f"Found {len(subscribers)} subscriber(s) in {target_tz}.")

          gmail_user = os.environ['GMAIL_USER']
          gmail_password = os.environ['GMAIL_PASSWORD']
          sent, errors = 0, 0

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(gmail_user, gmail_password)
              for sub in subscribers:
                  phone = (sub.get('Phone', '')
                           .replace('+1', '').replace('-', '')
                           .replace(' ', '').replace('(', '').replace(')', ''))
                  gateway = sub.get('Carrier', '').strip()
                  if not phone or not gateway:
                      print(f"Skipping incomplete row: {sub}")
                      continue
                  to_sms = f"{phone}@{gateway}"
                  name = sub.get('Name', '').strip()
                  greeting = f"Hey {name}! " if name else ""
                  msg = MIMEText(f"{greeting}Don't forget to count the Omer! Day {day}")
                  msg['Subject'] = ''
                  msg['From'] = gmail_user
                  msg['To'] = to_sms
                  try:
                      smtp.send_message(msg)
                      print(f"Sent Day {day} to {to_sms}")
                      sent += 1
                  except Exception as e:
                      print(f"Error sending to {to_sms}: {e}")
                      errors += 1

          print(f"Done. Sent: {sent}, Errors: {errors}")
          EOF
