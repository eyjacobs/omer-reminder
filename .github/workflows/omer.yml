name: Omer Reminder

# All times are UTC. EDT = UTC-4, so 8:22 PM EDT = 00:22 UTC next calendar day.
# Regular sends fire 10 minutes after nightfall (Eastern), sent to all subscribers.
# Friday sends fire 90 minutes before Shabbat with a special message.

on:
  schedule:
    # ── Regular nights (nightfall EDT + 10 min) ──────────────────────────────
    - cron: '22 0 13 4 *'   # Apr 12  8:22 PM EDT  — Day 11
    - cron: '23 0 14 4 *'   # Apr 13  8:23 PM EDT  — Day 12
    - cron: '24 0 15 4 *'   # Apr 14  8:24 PM EDT  — Day 13
    - cron: '25 0 16 4 *'   # Apr 15  8:25 PM EDT  — Day 14
    - cron: '26 0 17 4 *'   # Apr 16  8:26 PM EDT  — Day 15
    - cron: '28 0 19 4 *'   # Apr 18  8:28 PM EDT  — Day 17
    - cron: '29 0 20 4 *'   # Apr 19  8:29 PM EDT  — Day 18
    - cron: '30 0 21 4 *'   # Apr 20  8:30 PM EDT  — Day 19
    - cron: '31 0 22 4 *'   # Apr 21  8:31 PM EDT  — Day 20
    - cron: '32 0 23 4 *'   # Apr 22  8:32 PM EDT  — Day 21
    - cron: '33 0 24 4 *'   # Apr 23  8:33 PM EDT  — Day 22
    - cron: '35 0 26 4 *'   # Apr 25  8:35 PM EDT  — Day 24
    - cron: '36 0 27 4 *'   # Apr 26  8:36 PM EDT  — Day 25
    - cron: '37 0 28 4 *'   # Apr 27  8:37 PM EDT  — Day 26
    - cron: '38 0 29 4 *'   # Apr 28  8:38 PM EDT  — Day 27
    - cron: '39 0 30 4 *'   # Apr 29  8:39 PM EDT  — Day 28
    - cron: '40 0 1 5 *'    # Apr 30  8:40 PM EDT  — Day 29
    - cron: '42 0 3 5 *'    # May 2   8:42 PM EDT  — Day 31
    - cron: '43 0 4 5 *'    # May 3   8:43 PM EDT  — Day 32
    - cron: '44 0 5 5 *'    # May 4   8:44 PM EDT  — Day 33
    - cron: '45 0 6 5 *'    # May 5   8:45 PM EDT  — Day 34
    - cron: '46 0 7 5 *'    # May 6   8:46 PM EDT  — Day 35
    - cron: '47 0 8 5 *'    # May 7   8:47 PM EDT  — Day 36
    - cron: '49 0 10 5 *'   # May 9   8:49 PM EDT  — Day 38
    - cron: '50 0 11 5 *'   # May 10  8:50 PM EDT  — Day 39
    - cron: '51 0 12 5 *'   # May 11  8:51 PM EDT  — Day 40
    - cron: '52 0 13 5 *'   # May 12  8:52 PM EDT  — Day 41
    - cron: '53 0 14 5 *'   # May 13  8:53 PM EDT  — Day 42
    - cron: '54 0 15 5 *'   # May 14  8:54 PM EDT  — Day 43
    - cron: '56 0 17 5 *'   # May 16  8:56 PM EDT  — Day 45
    - cron: '57 0 18 5 *'   # May 17  8:57 PM EDT  — Day 46
    - cron: '58 0 19 5 *'   # May 18  8:58 PM EDT  — Day 47
    - cron: '59 0 20 5 *'   # May 19  8:59 PM EDT  — Day 48
    - cron: '0 1 21 5 *'    # May 20  9:00 PM EDT  — Day 49
    # ── Fridays (90 min before Shabbat, Eastern) ─────────────────────────────
    - cron: '48 21 17 4 *'  # Apr 17  5:48 PM EDT  — Day 16
    - cron: '56 21 24 4 *'  # Apr 24  5:56 PM EDT  — Day 23
    - cron: '3 22 1 5 *'    # May 1   6:03 PM EDT  — Day 30
    - cron: '10 22 8 5 *'   # May 8   6:10 PM EDT  — Day 37
    - cron: '17 22 15 5 *'  # May 15  6:17 PM EDT  — Day 44
  workflow_dispatch:         # allows manual test runs from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Omer reminders
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          python3 << 'EOF'
          import smtplib, os, csv, io, urllib.request
          from email.mime.text import MIMEText
          from datetime import date, datetime, timezone

          # UTC date -> Omer day number (for regular nightly sends)
          # Key is the UTC date when the cron fires (8 PM EDT = midnight UTC next day)
          SCHEDULE = {
              date(2026, 4, 13): 11,
              date(2026, 4, 14): 12,
              date(2026, 4, 15): 13,
              date(2026, 4, 16): 14,
              date(2026, 4, 17): 15,
              date(2026, 4, 19): 17,
              date(2026, 4, 20): 18,
              date(2026, 4, 21): 19,
              date(2026, 4, 22): 20,
              date(2026, 4, 23): 21,
              date(2026, 4, 24): 22,
              date(2026, 4, 26): 24,
              date(2026, 4, 27): 25,
              date(2026, 4, 28): 26,
              date(2026, 4, 29): 27,
              date(2026, 4, 30): 28,
              date(2026, 5,  1): 29,
              date(2026, 5,  3): 31,
              date(2026, 5,  4): 32,
              date(2026, 5,  5): 33,
              date(2026, 5,  6): 34,
              date(2026, 5,  7): 35,
              date(2026, 5,  8): 36,
              date(2026, 5, 10): 38,
              date(2026, 5, 11): 39,
              date(2026, 5, 12): 40,
              date(2026, 5, 13): 41,
              date(2026, 5, 14): 42,
              date(2026, 5, 15): 43,
              date(2026, 5, 17): 45,
              date(2026, 5, 18): 46,
              date(2026, 5, 19): 47,
              date(2026, 5, 20): 48,
              date(2026, 5, 21): 49,
          }

          # Hebrew counting text for each Omer day
          HEBREW = {
              11: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d1\u05d5\u05e2 \u05d0\u05d7\u05d3 \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              12: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05e0\u05d9\u05dd \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d1\u05d5\u05e2 \u05d0\u05d7\u05d3 \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              13: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d1\u05d5\u05e2 \u05d0\u05d7\u05d3 \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              14: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
              15: '\u05d4\u05d9\u05d5\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05dc\u05e2\u05d5\u05de\u05e8',
              16: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05e0\u05d9 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              17: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05d1\u05e2\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              18: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05de\u05d5\u05e0\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              19: '\u05d4\u05d9\u05d5\u05dd \u05ea\u05e9\u05e2\u05d4 \u05e2\u05e9\u05e8 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              20: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05e0\u05d9 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              21: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05d0\u05d7\u05d3 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
              22: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05e9\u05e0\u05d9\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05dc\u05e2\u05d5\u05de\u05e8',
              23: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05e0\u05d9 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              24: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              25: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              26: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              27: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05e9\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05dc\u05d5\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              28: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05e9\u05de\u05d5\u05e0\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
              29: '\u05d4\u05d9\u05d5\u05dd \u05e2\u05e9\u05e8\u05d9\u05dd \u05d5\u05ea\u05e9\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05dc\u05e2\u05d5\u05de\u05e8',
              30: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05e0\u05d9 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              31: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05d0\u05d7\u05d3 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              32: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05e9\u05e0\u05d9\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              33: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              34: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d0\u05e8\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              35: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
              36: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05dc\u05e2\u05d5\u05de\u05e8',
              37: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05e9\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05e0\u05d9 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              38: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05e9\u05de\u05d5\u05e0\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              39: '\u05d4\u05d9\u05d5\u05dd \u05e9\u05dc\u05d5\u05e9\u05d9\u05dd \u05d5\u05ea\u05e9\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              40: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              41: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05d0\u05d7\u05d3 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05d7\u05de\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              42: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05e9\u05e0\u05d9\u05d9\u05dd \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
              43: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d9\u05d5\u05dd \u05d0\u05d7\u05d3 \u05dc\u05e2\u05d5\u05de\u05e8',
              44: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05e0\u05d9 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              45: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              46: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d0\u05e8\u05d1\u05e2\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              47: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05e9\u05d1\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05d7\u05de\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              48: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05e9\u05de\u05d5\u05e0\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d9\u05e9\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05d5\u05e9\u05d9\u05e9\u05d4 \u05d9\u05de\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e8',
              49: '\u05d4\u05d9\u05d5\u05dd \u05d0\u05e8\u05d1\u05e2\u05d9\u05dd \u05d5\u05ea\u05e9\u05e2\u05d4 \u05d9\u05d5\u05dd \u05e9\u05d4\u05dd \u05e9\u05d1\u05e2\u05d4 \u05e9\u05d1\u05d5\u05e2\u05d5\u05ea \u05dc\u05e2\u05d5\u05de\u05e8',
          }

          # Friday sends: UTC date -> (Omer day, nightfall time string)
          # UTC date = same EDT date since these fire at ~10 PM UTC
          FRIDAY_SCHEDULE = {
              date(2026, 4, 17): (16, "8:17 PM"),
              date(2026, 4, 24): (23, "8:24 PM"),
              date(2026, 5,  1): (30, "8:31 PM"),
              date(2026, 5,  8): (37, "8:38 PM"),
              date(2026, 5, 15): (44, "8:45 PM"),
          }

          now   = datetime.now(timezone.utc)
          today = now.date()
          hour  = now.hour

          is_friday_send  = today in FRIDAY_SCHEDULE and hour in (21, 22)
          is_regular_send = today in SCHEDULE and hour in (0, 1)

          if not is_friday_send and not is_regular_send:
              print(f"No send scheduled for UTC {today} hour {hour}. Skipping.")
              exit(0)

          # Fetch subscriber list
          sheet_url = os.environ['SHEET_CSV_URL']
          with urllib.request.urlopen(sheet_url) as resp:
              csv_data = resp.read().decode('utf-8')
          all_subscribers = list(csv.DictReader(io.StringIO(csv_data)))

          # Build (subscriber, message) pairs
          sends = []
          if is_friday_send:
              day, nightfall = FRIDAY_SCHEDULE[today]
              print(f"Friday send — Day {day}, nightfall {nightfall}, {len(all_subscribers)} subscriber(s).")
              for sub in all_subscribers:
                  name     = sub.get('Name', '').strip()
                  greeting = f"Hey {name}! " if name else ""
                  hebrew   = HEBREW.get(day, '')
                  body     = (f"{greeting}Don't forget to count Day {day} of the Omer "
                              f"tonight after {nightfall}. Shabbat shalom! {hebrew}")
                  sends.append((sub, body))
          else:
              day  = SCHEDULE[today]
              print(f"Regular send — Day {day}, {len(all_subscribers)} subscriber(s).")
              for sub in all_subscribers:
                  name     = sub.get('Name', '').strip()
                  greeting = f"Hey {name}! " if name else ""
                  hebrew   = HEBREW.get(day, '')
                  body     = f"{greeting}Don't forget to count the Omer! Day {day} {hebrew}"
                  sends.append((sub, body))

          # Send all messages
          gmail_user     = os.environ['GMAIL_USER']
          gmail_password = os.environ['GMAIL_PASSWORD']
          sent = errors  = 0

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(gmail_user, gmail_password)
              for sub, body in sends:
                  phone = (sub.get('Phone', '')
                           .replace('+1', '').replace('-', '')
                           .replace(' ', '').replace('(', '').replace(')', ''))
                  gateway = sub.get('Carrier', '').strip()
                  if not phone or not gateway:
                      print(f"Skipping incomplete row: {sub}")
                      continue
                  to_sms = f"{phone}@{gateway}"
                  msg            = MIMEText(body)
                  msg['Subject'] = ''
                  msg['From']    = gmail_user
                  msg['To']      = to_sms
                  try:
                      smtp.send_message(msg)
                      print(f"Sent to {to_sms}: {body}")
                      sent += 1
                  except Exception as e:
                      print(f"Error sending to {to_sms}: {e}")
                      errors += 1

          print(f"Done. Sent: {sent}, Errors: {errors}")
          EOF
